<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Arbat 38</title>
<style>
/* ===== RESET ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'TildaSans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;height:100dvh;display:flex;justify-content:center}
a{color:inherit;text-decoration:none}
button{border:none;background:none;color:inherit;font:inherit;cursor:pointer}
input{border:none;background:none;color:inherit;font:inherit;outline:none}
::-webkit-scrollbar{display:none}

/* ===== VARS ===== */
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1c;--bg4:#222;
  --gold:#aa9570;--gold-light:#c4ad8a;--gold-dim:rgba(170,149,112,0.15);
  --gold-border:rgba(170,149,112,0.25);
  --white:#fff;--text2:#999;--text3:#555;
  --radius:14px;--radius-sm:10px;
  --tab-h:64px;
}

/* ===== APP ===== */
#app{width:100%;max-width:430px;height:100dvh;background:var(--bg);position:relative;overflow:hidden}

/* ===== SPLASH ===== */
#splash{position:absolute;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s,visibility .6s}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
.splash-logo{width:140px;height:140px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;border:1px solid var(--gold-border);margin-bottom:20px}
.splash-text{color:var(--gold);font-size:12px;letter-spacing:4px;text-transform:uppercase;font-weight:300}

/* ===== SCREENS ===== */
.screen{position:absolute;top:env(safe-area-inset-top);left:0;right:0;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;opacity:0;visibility:hidden;transition:opacity .3s;padding-bottom:80px}
.screen.active{opacity:1;visibility:visible}

/* ===== TAB BAR ===== */
#tab-bar{position:absolute;bottom:0;left:0;right:0;height:calc(var(--tab-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--bg);border-top:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-around;z-index:50}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:16px;transition:all .2s;min-width:52px}
.tab-btn.active{background:rgba(170,149,112,0.12)}
.tab-btn svg{width:22px;height:22px}
.tab-btn span{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);font-weight:500}
.tab-btn.active span{color:var(--gold)}
.tab-btn svg path,.tab-btn svg circle,.tab-btn svg rect,.tab-btn svg line{stroke:var(--text3);transition:stroke .2s}
.tab-btn.active svg path,.tab-btn.active svg circle,.tab-btn.active svg rect,.tab-btn.active svg line{stroke:var(--gold)}

/* ===== COMMON ===== */
.section-title{font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold);padding:0 20px;margin-bottom:16px}
.divider{height:1px;background:var(--gold-border);margin:0 20px}

/* ===== CAROUSEL ===== */
.carousel{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 20px 4px;margin-bottom:32px}

/* ===== HOME ===== */
.home-header{display:flex;align-items:center;justify-content:space-between;padding:24px 20px 20px}
.home-greeting{font-size:13px;color:var(--text2);font-weight:300;letter-spacing:1px}
.home-name{font-size:28px;font-weight:300;letter-spacing:1px;margin-top:2px}
.bell-btn svg{width:22px;height:22px}

.bonus-card{margin:0 20px 20px;padding:24px;border-radius:var(--radius);background:linear-gradient(135deg,#1a1610 0%,#2a2218 50%,#1a1610 100%);border:1px solid var(--gold-border);position:relative;overflow:hidden}
.bonus-card .watermark{position:absolute;right:-20px;bottom:-20px;font-size:120px;font-weight:800;color:rgba(170,149,112,0.06);font-family:Georgia,serif;pointer-events:none}
.bonus-card .label{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.bonus-card .points{font-size:44px;font-weight:200;letter-spacing:-1px;color:var(--gold-light)}
.bonus-card .level{margin-top:12px;font-size:12px;font-weight:400;color:var(--gold);letter-spacing:1px}
.bonus-card .rates{font-size:11px;color:var(--text3);margin-top:4px;letter-spacing:.5px}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;margin-bottom:32px}
.stat-card{background:var(--bg2);border:1px solid #1e1e1e;border-radius:var(--radius-sm);padding:18px 16px;cursor:pointer;transition:border-color .2s}
.stat-card:active{border-color:var(--gold-border)}
.stat-card .stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:2px}
.stat-card .stat-value{font-size:28px;font-weight:200;color:var(--gold-light);margin-top:6px}

/* Projects */
.project-card{flex:0 0 75%;scroll-snap-align:start;border-radius:var(--radius);overflow:hidden;position:relative;height:220px;display:flex;align-items:flex-end;cursor:pointer}
.project-card .proj-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center}
.project-card .proj-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.3) 40%,rgba(0,0,0,.05) 100%);z-index:1}
.project-card .proj-info{position:relative;z-index:2;padding:18px;width:100%}
.project-card .proj-name{font-size:18px;font-weight:400;letter-spacing:2px;text-transform:uppercase}
.project-card .proj-type{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.project-card .proj-line{width:32px;height:1px;background:var(--gold);margin-top:8px}

/* Promos */
.promo-card{flex:0 0 82%;scroll-snap-align:start;border-radius:var(--radius);overflow:hidden;position:relative;min-height:160px;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;border:1px solid #1e1e1e}
.promo-card .promo-bg{position:absolute;inset:0;z-index:0}
.promo-card .promo-content{position:relative;z-index:1}
.promo-card .promo-brand{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.promo-card .promo-title{font-size:15px;font-weight:400;line-height:1.35;letter-spacing:.5px}
.promo-card .promo-sub{font-size:11px;color:var(--text2);margin-top:6px}

/* ===== EVENTS ===== */
.events-header{padding:24px 20px 16px}
.events-header h1{font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.pill-tabs{display:flex;gap:8px;padding:0 20px 20px}
.pill-tab{padding:8px 18px;border-radius:50px;border:1px solid #2a2a2a;font-size:11px;font-weight:400;color:var(--text3);transition:all .2s;letter-spacing:1px;text-transform:uppercase}
.pill-tab.active{border-color:var(--gold);color:var(--gold)}
.event-feed{padding:0 20px;display:flex;flex-direction:column;gap:12px}
.event-card{border-radius:var(--radius);overflow:hidden;position:relative;min-height:150px;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;border:1px solid #1e1e1e}
.event-card .event-bg{position:absolute;inset:0;z-index:0}
.event-card .event-content{position:relative;z-index:1}
.event-card .event-brand{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.event-card .event-title{font-size:16px;font-weight:400;line-height:1.3;letter-spacing:.5px}
.event-card .event-sub{font-size:11px;margin-top:6px;color:var(--text2)}

/* ===== RESTAURANTS ===== */
.rest-header{padding:24px 20px 12px}
.rest-header h1{font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.search-bar{margin:0 20px 20px;background:var(--bg2);border:1px solid #1e1e1e;border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;gap:10px}
.search-bar svg{width:16px;height:16px;flex-shrink:0}
.search-bar input{flex:1;font-size:13px;color:var(--text2);letter-spacing:.5px}
.search-bar input::placeholder{color:var(--text3)}

.airport-group{margin-bottom:2px}
.airport-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;transition:background .2s}
.airport-header:active{background:var(--bg2)}
.airport-icon{font-size:16px;margin-right:10px;display:flex;align-items:center;flex-shrink:0}
.airport-name{font-size:13px;font-weight:400;flex:1;letter-spacing:.5px}
.airport-count{font-size:10px;color:var(--gold);background:var(--gold-dim);padding:3px 10px;border-radius:10px;margin-right:10px;letter-spacing:1px}
.chevron{transition:transform .3s;color:var(--text3);font-size:12px}
.airport-group.expanded .chevron{transform:rotate(180deg)}
.airport-list{max-height:0;overflow:hidden;transition:max-height .35s ease}
.airport-group.expanded .airport-list{max-height:2000px}

.rest-item{display:flex;align-items:center;padding:14px 20px 14px 50px;border-bottom:1px solid #151515;cursor:pointer;transition:background .15s}
.rest-item:active{background:var(--bg2)}
.rest-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;margin-right:12px;flex-shrink:0;border:1px solid var(--gold-border);color:var(--gold);overflow:hidden}
.rest-icon img{width:100%;height:100%;object-fit:cover}
.rest-info{flex:1}
.rest-name{font-size:13px;font-weight:400;letter-spacing:.5px}
.rest-type{font-size:11px;color:var(--text3);margin-top:2px}
.coming-soon{font-size:9px;color:var(--gold);background:var(--gold-dim);padding:3px 8px;border-radius:6px;letter-spacing:1px;text-transform:uppercase}
.rest-arrow{color:var(--text3);margin-left:8px}

/* ===== MODAL ===== */
.modal-wrap{position:fixed;top:0;left:0;right:0;bottom:0;z-index:80;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s}
.modal-wrap.open{opacity:1;visibility:visible}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7)}
.modal-sheet{position:relative;z-index:1;width:100%;max-width:430px;max-height:85vh;background:var(--bg);border-radius:20px 20px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .35s ease;border-top:1px solid var(--gold-border)}
.modal-wrap.open .modal-sheet{transform:translateY(0)}
.modal-head{position:sticky;top:0;background:var(--bg);padding:20px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;z-index:2}
.modal-head h2{font-size:14px;font-weight:400;letter-spacing:2px;text-transform:uppercase}
.modal-close{width:32px;height:32px;border-radius:50%;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text3);cursor:pointer}
.modal-body{padding:16px 20px 40px}

/* Menu Items */
.menu-cat{margin-bottom:28px}
.menu-cat-title{font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.menu-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #151515;gap:12px}
.menu-item-img{width:64px;height:64px;border-radius:10px;flex-shrink:0;overflow:hidden}
.menu-item-img img{width:100%;height:100%;object-fit:cover}
.menu-item-img div{width:100%;height:100%}
.menu-item-info{flex:1}
.menu-item-name{font-size:13px;font-weight:400;letter-spacing:.3px}
.menu-item-desc{font-size:11px;color:var(--text3);margin-top:3px}
.menu-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.menu-item-price{font-size:13px;color:var(--gold);font-weight:400;white-space:nowrap}
.fav-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;transition:background .2s}
.fav-btn:active{background:var(--gold-dim)}
.fav-btn svg{width:16px;height:16px}
.fav-btn.liked svg path{fill:var(--gold);stroke:var(--gold)}

/* ===== ADDRESSES ===== */
.addr-header{padding:24px 20px 12px}
.addr-header h1{font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.toggle-bar{display:flex;margin:0 20px 20px;background:var(--bg2);border:1px solid #1e1e1e;border-radius:var(--radius-sm);padding:3px}
.toggle-btn{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;border-radius:8px;color:var(--text3);transition:all .25s}
.toggle-btn.active{background:rgba(170,149,112,0.15);color:var(--gold)}
.addr-list,.addr-map{display:none}
.addr-list.active,.addr-map.active{display:block}
.addr-item{padding:16px 20px;border-bottom:1px solid #151515}
.addr-name{font-size:13px;font-weight:400;letter-spacing:.5px}
.addr-detail{font-size:11px;color:var(--text3);margin-top:4px}
.map-container{margin:0 20px;border-radius:var(--radius);overflow:hidden;background:#0a1220;position:relative;height:360px;border:1px solid #1e1e1e}
.map-container svg{width:100%;height:100%}
.map-pin circle{fill:var(--gold)}
.map-pin text{fill:#000;font-size:10px;font-weight:700;text-anchor:middle;dominant-baseline:central}
.map-label{fill:var(--text3);font-size:8px;text-anchor:middle}
.addr-search{margin:16px 20px 0;background:var(--bg2);border:1px solid #1e1e1e;border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:10px}
.addr-search svg{width:16px;height:16px;flex-shrink:0}
.addr-search input{flex:1;font-size:13px}
.addr-search input::placeholder{color:var(--text3)}

/* ===== PROFILE ===== */
.prof-header{display:flex;align-items:center;justify-content:space-between;padding:24px 20px 20px}
.prof-left{display:flex;align-items:center;gap:14px}
.prof-avatar{width:48px;height:48px;border-radius:50%;border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center}
.prof-avatar svg{width:22px;height:22px}

.card-flip-wrap{perspective:1000px;margin:0 20px 20px;cursor:pointer;height:170px}
.card-flip{position:relative;transition:transform .6s;transform-style:preserve-3d;height:170px}
.card-flip.flipped{transform:rotateY(180deg)}
.card-front,.card-back{backface-visibility:hidden;border-radius:var(--radius);position:absolute;top:0;left:0;right:0;height:170px}
.card-front{z-index:2}
.card-back{transform:rotateY(180deg);background:#fff;color:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;border:1px solid var(--gold-border)}
.qr-grid{width:110px;height:110px;display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(10,1fr);gap:1px;margin-bottom:10px}
.qr-cell{border-radius:1px}
.qr-cell.dark{background:#0a0a0a}
.qr-cell.light{background:#fff}
.qr-label{font-size:11px;color:#666;letter-spacing:1px}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;margin-bottom:24px}
.stat-box{background:var(--bg2);border:1px solid #1e1e1e;border-radius:var(--radius-sm);padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s}
.stat-box:active{border-color:var(--gold-border)}
.stat-box .st-icon{width:34px;height:34px;border-radius:8px;background:var(--gold-dim);display:flex;align-items:center;justify-content:center}
.stat-box .st-icon svg{width:16px;height:16px}
.stat-box .st-num{font-size:18px;font-weight:300;color:var(--gold-light)}
.stat-box .st-lbl{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}

/* Certificates */
.cert-card{flex:0 0 70%;scroll-snap-align:start;border-radius:var(--radius);border:1px solid var(--gold-border);overflow:hidden;padding:20px;background:var(--bg2);display:flex;flex-direction:column;gap:12px}
.cert-amount{font-size:32px;font-weight:200;color:var(--gold-light)}
.cert-name{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text2)}
.cert-btns{display:flex;gap:8px;margin-top:auto}
.cert-btn{padding:8px 16px;border-radius:8px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;transition:all .2s}
.cert-btn.buy{background:var(--gold);color:#000}
.cert-btn.gift{border:1px solid var(--gold-border);color:var(--gold)}

/* Menu List */
.prof-menu{padding:0 20px}
.prof-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #151515;cursor:pointer}
.prof-row:active{opacity:.6}
.prof-row span{font-size:13px;font-weight:300;letter-spacing:.5px}
.prof-row .arr{color:var(--text3);font-size:14px}

/* Chat */
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:80%;padding:12px 16px;border-radius:14px;font-size:13px;line-height:1.45;font-weight:300}
.chat-msg.bot{background:var(--bg2);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid #1e1e1e}
.chat-msg.user{background:rgba(170,149,112,0.15);align-self:flex-end;border-bottom-right-radius:4px;border:1px solid var(--gold-border);color:var(--gold-light)}
.chat-bar{padding:12px 20px;border-top:1px solid #1a1a1a;display:flex;gap:10px}
.chat-bar input{flex:1;background:var(--bg2);padding:12px 16px;border-radius:24px;font-size:13px;color:#fff;border:1px solid #1e1e1e}
.chat-bar input::placeholder{color:var(--text3)}
.chat-send{width:42px;height:42px;border-radius:50%;background:rgba(170,149,112,0.2);display:flex;align-items:center;justify-content:center;border:1px solid var(--gold-border)}
.chat-send svg{width:18px;height:18px}
</style>
</head>
<body>

<div id="app">
  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-logo">
      <svg width="90" height="90" viewBox="0 0 100 100">
        <text x="10" y="40" font-size="18" fill="#aa9570" font-weight="600" font-family="Georgia,serif" letter-spacing="1">ARBAT</text>
        <text x="48" y="72" font-size="38" fill="#aa9570" font-weight="700" font-family="Georgia,serif">38</text>
        <text x="6" y="90" font-size="7" fill="#aa9570" letter-spacing="1.2" font-family="sans-serif" font-weight="300">GROUP OF COMPANIES</text>
      </svg>
    </div>
    <div class="splash-text">Arbat 38</div>
  </div>

  <div id="screen-home" class="screen"></div>
  <div id="screen-events" class="screen"></div>
  <div id="screen-restaurants" class="screen"></div>
  <div id="screen-addresses" class="screen"></div>
  <div id="screen-profile" class="screen"></div>

  <!-- TAB BAR -->
  <div id="tab-bar">
    <button class="tab-btn active" data-action="navigate" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.2">
        <circle cx="12" cy="12" r="10"/>
        <text x="12" y="15" text-anchor="middle" font-size="8" font-weight="700" fill="currentColor" stroke="none" font-family="Georgia,serif">38</text>
      </svg>
      <span>Arbat</span>
    </button>
    <button class="tab-btn" data-action="navigate" data-tab="events">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>События</span>
    </button>
    <button class="tab-btn" data-action="navigate" data-tab="restaurants">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
      <span>Меню</span>
    </button>
    <button class="tab-btn" data-action="navigate" data-tab="addresses">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      <span>Адреса</span>
    </button>
    <button class="tab-btn" data-action="navigate" data-tab="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.2"><circle cx="12" cy="8" r="4"/><path d="M20 21c0-4.42-3.58-8-8-8s-8 3.58-8 8"/></svg>
      <span>Кабинет</span>
    </button>
  </div>

  <!-- REST MODAL -->
  <div id="rest-modal" class="modal-wrap">

      <div class="stat-box"><div class="st-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#aa9570" stroke-width="1.2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/></svg></div><div><div class="st-num">${USER.gifts}</div><div class="st-lbl">подарки</div></div></div>
      <div class="stat-box"><div class="st-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#aa9570" stroke-width="1.2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div><div><div class="st-num">${USER.promo||'—'}</div><div class="st-lbl">промокод</div></div></div>
    </div>
    <div class="section-title" style="margin-top:8px">Сертификаты</div>
    <div class="carousel">${CERTS.map((c,i)=>`
      <div class="cert-card">
        <div class="cert-name">${c.name}</div>
        <div class="cert-amount">${c.amount}</div>
        <div class="cert-btns">
          <button class="cert-btn buy" data-action="buy-cert" data-idx="${i}">Купить</button>
          <button class="cert-btn gift" data-action="gift-cert" data-idx="${i}">Подарить</button>
        </div>
      </div>`).join('')}</div>
    <div style="padding:0 20px;margin-bottom:8px"><div style="height:1px;background:#1a1a1a"></div></div>
    <div class="prof-menu">
      <div class="prof-row"><span>Помощь</span><span class="arr">›</span></div>
      <div class="prof-row"><span>Задать пароль</span><span class="arr">›</span></div>
      <div class="prof-row" data-action="open-chat"><span>Чат с консультантом</span><span class="arr">›</span></div>
    </div>`;
}

// ===== NAV =====
function navigate(tab) {
  state.tab = tab;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const scr = document.getElementById('screen-'+tab);
  const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  switch(tab){
    case 'home': scr.innerHTML=renderHome(); break;
    case 'events': scr.innerHTML=renderEvents(); break;
    case 'restaurants': scr.innerHTML=renderRestaurants(); break;
    case 'addresses': scr.innerHTML=renderAddresses(); break;
    case 'profile': scr.innerHTML=renderProfile(); break;
  }
  scr.classList.add('active');
  if(btn) btn.classList.add('active');
  scr.scrollTop=0;
}

// ===== EVENTS =====
document.getElementById('app').addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const a = el.dataset.action;

  if(a==='navigate') navigate(el.dataset.tab);
  else if(a==='filter-events') { state.eventsFilter=el.dataset.filter; document.getElementById('screen-events').innerHTML=renderEvents(); }
  else if(a==='toggle-airport') {
    const id=el.dataset.id;
    state.expanded.has(id)?state.expanded.delete(id):state.expanded.add(id);
    el.closest('.airport-group').classList.toggle('expanded');
  }
  else if(a==='open-rest') {
    const ap=AIRPORTS.find(x=>x.id===el.dataset.airport);
    if(!ap) return;
    const rName=ap.restaurants[parseInt(el.dataset.idx)];
    if(!rName||rName.endsWith('*')) return;
    document.getElementById('modal-title').textContent=rName;
    document.getElementById('modal-body').innerHTML=renderMenu(rName);
    document.getElementById('rest-modal').classList.add('open');
  }
  else if(a==='close-modal') document.getElementById('rest-modal').classList.remove('open');
  else if(a==='toggle-fav') {
    const fid=el.dataset.fid;
    favorites.has(fid)?favorites.delete(fid):favorites.add(fid);
    USER.favorites=favorites.size;
    el.classList.toggle('liked');
    el.innerHTML=heartSvg(favorites.has(fid));
  }
  else if(a==='addr-view') { state.addrView=el.dataset.view; document.getElementById('screen-addresses').innerHTML=renderAddresses(); }
  else if(a==='flip-card') { state.flipped=!state.flipped; const f=document.querySelector('.card-flip'); if(f) f.classList.toggle('flipped'); }
  else if(a==='open-chat') document.getElementById('chat-modal').classList.add('open');
  else if(a==='close-chat') document.getElementById('chat-modal').classList.remove('open');
  else if(a==='send-chat') {
    const inp=document.getElementById('chat-input'), msg=inp.value.trim();
    if(!msg) return;
    const msgs=document.getElementById('chat-msgs');
    msgs.innerHTML+=`<div class="chat-msg user">${msg}</div>`; inp.value=''; msgs.scrollTop=msgs.scrollHeight;
    setTimeout(()=>{ msgs.innerHTML+=`<div class="chat-msg bot">${AI_RESP[Math.floor(Math.random()*AI_RESP.length)]}</div>`; msgs.scrollTop=msgs.scrollHeight; },700);
  }
  else if(a==='buy-cert'||a==='gift-cert') {
    const c=CERTS[parseInt(el.dataset.idx)];
    const isGift=a==='gift-cert';
    document.getElementById('cert-title').textContent=isGift?'Подарить сертификат':'Купить сертификат';
    document.getElementById('cert-body').innerHTML=`
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:40px;font-weight:200;color:var(--gold-light);margin-bottom:12px">${c.amount}</div>
        <div style="font-size:12px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px">${c.name}</div>
        ${isGift?`<div style="margin-bottom:16px"><input type="text" placeholder="Имя получателя" style="width:100%;padding:14px 16px;background:var(--bg2);border:1px solid #1e1e1e;border-radius:10px;color:#fff;font-size:13px;margin-bottom:10px"><input type="text" placeholder="Телефон или email" style="width:100%;padding:14px 16px;background:var(--bg2);border:1px solid #1e1e1e;border-radius:10px;color:#fff;font-size:13px"></div>`:''}
        <button style="width:100%;padding:16px;background:var(--gold);color:#000;border:none;border-radius:10px;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:500">${isGift?'Отправить подарок':'Оплатить'}</button>
        <div style="font-size:11px;color:var(--text3);margin-top:12px">Сертификат будет${isGift?' отправлен получателю':' добавлен в ваш аккаунт'}</div>
      </div>`;
    document.getElementById('cert-modal').classList.add('open');
  }
  else if(a==='close-cert') document.getElementById('cert-modal').classList.remove('open');
  else if(a==='open-project') {
    const name=el.dataset.name;
    document.getElementById('modal-title').textContent=name;
    document.getElementById('modal-body').innerHTML=renderMenu(name);
    document.getElementById('rest-modal').classList.add('open');
  }
});

document.getElementById('chat-input').addEventListener('keydown',function(e){if(e.key==='Enter')document.querySelector('[data-action="send-chat"]').click()});

document.getElementById('app').addEventListener('input',function(e){
  if(e.target.id==='rest-search'){
    const q=e.target.value.toLowerCase();
    document.querySelectorAll('.airport-group').forEach(g=>{
      let has=false;
      g.querySelectorAll('.rest-item').forEach(i=>{const n=i.querySelector('.rest-name').textContent.toLowerCase();const m=!q||n.includes(q);i.style.display=m?'':'none';if(m)has=true});
      g.style.display=has?'':'none';
      if(q&&has)g.classList.add('expanded');
    });
  }
});

// ===== INIT =====
setTimeout(()=>{document.getElementById('splash').classList.add('hidden');navigate('home')},1400);
</script>
</body>
</html>
