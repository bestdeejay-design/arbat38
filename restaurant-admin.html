<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbat 38 - Управление рестораном</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
}

:root {
    --gold: #aa9570;
    --gold-light: #c4ad8a;
    --gold-dim: rgba(170,149,112,0.15);
    --gold-border: rgba(170,149,112,0.25);
    --bg: #0a0a0a;
    --bg2: #141414;
    --bg3: #1c1c1c;
    --text2: #999;
    --text3: #555;
    --success: #4CAF50;
    --warning: #FF9800;
    --info: #2196F3;
}

/* Layout */
.layout {
    display: flex;
    min-height: 100vh;
}

.sidebar {
    width: 280px;
    background: var(--bg2);
    border-right: 1px solid #1a1a1a;
    padding: 24px 0;
}

.restaurant-header {
    padding: 0 24px 24px;
    border-bottom: 1px solid #1a1a1a;
    margin-bottom: 24px;
}

.restaurant-header h1 {
    font-size: 18px;
    font-weight: 400;
    color: var(--gold);
    margin-bottom: 4px;
}

.restaurant-header p {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.5px;
}

.nav-menu {
    list-style: none;
}

.nav-item {
    padding: 14px 24px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    font-weight: 400;
    border-left: 3px solid transparent;
    display: flex;
    align-items: center;
    gap: 12px;
}

.nav-item:hover {
    background: var(--gold-dim);
    border-left-color: var(--gold);
}

.nav-item.active {
    background: var(--gold-dim);
    border-left-color: var(--gold);
    color: var(--gold);
}

.nav-item .badge {
    background: var(--warning);
    color: #000;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin-left: auto;
}

.main-content {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
}

.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid #1a1a1a;
}

.page-header h2 {
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 1px;
}

.btn {
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-family: inherit;
}

.btn-primary {
    background: var(--gold);
    color: #000;
}

.btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.btn-secondary {
    background: transparent;
    border: 1px solid var(--gold-border);
    color: var(--gold);
}

.btn-success {
    background: var(--success);
    color: #fff;
}

.btn-sm {
    padding: 8px 16px;
    font-size: 11px;
}

/* Orders */
.orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
}

.order-card {
    background: var(--bg2);
    border: 2px solid #1e1e1e;
    border-radius: 14px;
    padding: 20px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.order-card.new {
    border-color: var(--info);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.4); }
    50% { box-shadow: 0 0 0 10px rgba(33, 150, 243, 0); }
}

.order-card.preparing {
    border-color: var(--warning);
}

.order-card.ready {
    border-color: var(--success);
}

.order-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
}

.order-id {
    font-size: 18px;
    font-weight: 500;
    color: var(--gold-light);
}

.order-time {
    font-size: 12px;
    color: var(--text3);
}

.order-customer {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 12px;
}

.order-items-list {
    background: var(--bg3);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 16px;
}

.order-item-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
}

.order-item-row:not(:last-child) {
    border-bottom: 1px solid #2a2a2a;
}

.order-total {
    display: flex;
    justify-content: space-between;
    font-size: 16px;
    font-weight: 500;
    color: var(--gold);
    margin-bottom: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--gold-border);
}

.order-timer {
    font-size: 12px;
    color: var(--warning);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.order-actions {
    display: flex;
    gap: 8px;
}

.order-actions .btn {
    flex: 1;
}

/* Status Badge */
.status-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.status-new {
    background: rgba(33, 150, 243, 0.15);
    color: var(--info);
}

.status-preparing {
    background: rgba(255, 152, 0, 0.15);
    color: var(--warning);
}

.status-ready {
    background: rgba(76, 175, 80, 0.15);
    color: var(--success);
}

.status-completed {
    background: rgba(158, 158, 158, 0.15);
    color: #9E9E9E;
}

/* Menu Management */
.menu-categories {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.menu-category {
    background: var(--bg2);
    border: 1px solid #1e1e1e;
    border-radius: 14px;
    overflow: hidden;
}

.category-header {
    padding: 20px 24px;
    background: var(--bg3);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

.category-header h3 {
    font-size: 16px;
    font-weight: 400;
}

.category-items {
    padding: 0;
}

.menu-item {
    padding: 20px 24px;
    border-bottom: 1px solid #151515;
    display: flex;
    align-items: center;
    gap: 16px;
}

.menu-item:last-child {
    border-bottom: none;
}

.menu-item-img {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
}

.menu-item-info {
    flex: 1;
}

.menu-item-name {
    font-size: 15px;
    font-weight: 400;
    margin-bottom: 6px;
}

.menu-item-desc {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 8px;
}

.menu-item-price {
    font-size: 16px;
    font-weight: 500;
    color: var(--gold);
}

.menu-item-actions {
    display: flex;
    gap: 8px;
}

/* Form Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 999;
    align-items: center;
    justify-content: center;
}

.modal.show {
    display: flex;
}

.modal-content {
    background: var(--bg2);
    border: 1px solid var(--gold-border);
    border-radius: 14px;
    padding: 32px;
    max-width: 600px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}

.modal-header h3 {
    font-size: 18px;
    font-weight: 400;
}

.close-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text3);
    font-size: 18px;
}

.close-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
}

.form-group input,
.form-group textarea,
.form-group select {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg3);
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
}

.form-group textarea {
    min-height: 100px;
    resize: vertical;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--gold);
}

.form-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
}

.form-actions .btn {
    flex: 1;
}

/* Toast */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--gold);
    color: #000;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    z-index: 1000;
    transform: translateX(400px);
    transition: transform 0.3s ease;
}

.toast.show {
    transform: translateX(0);
}

/* Stats */
.stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
}

.stat-card {
    background: var(--bg2);
    border: 1px solid #1e1e1e;
    border-radius: 14px;
    padding: 20px;
}

.stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
}

.stat-value {
    font-size: 32px;
    font-weight: 200;
    color: var(--gold-light);
}

@media (max-width: 1024px) {
    .sidebar {
        width: 240px;
    }
}

@media (max-width: 768px) {
    .layout {
        flex-direction: column;
    }
    
    .sidebar {
        width: 100%;
    }
    
    .main-content {
        padding: 20px;
    }
    
    .orders-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="restaurant-header">
            <h1>BLACK STAR BURGER</h1>
            <p>SVO Терминал B</p>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" data-page="orders">
                <span>📋</span> Заказы
                <span class="badge" id="new-orders-count">3</span>
            </li>
            <li class="nav-item" data-page="menu">
                <span>🍔</span> Меню
            </li>
            <li class="nav-item" data-page="settings">
                <span>⚙️</span> Настройки
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Orders Page -->
        <div id="page-orders">
            <div class="page-header">
                <h2>Заказы</h2>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-secondary btn-sm" onclick="filterOrders('all')">Все</button>
                    <button class="btn btn-secondary btn-sm" onclick="filterOrders('new')">Новые</button>
                    <button class="btn btn-secondary btn-sm" onclick="filterOrders('preparing')">Готовятся</button>
                </div>
            </div>

            <div class="orders-grid" id="orders-grid">
                <!-- Orders will be rendered here -->
            </div>
        </div>

        <!-- Menu Page -->
        <div id="page-menu" style="display: none;">
            <div class="page-header">
                <h2>Управление меню</h2>
                <button class="btn btn-primary" onclick="showAddCategoryModal()">+ Добавить категорию</button>
            </div>

            <div class="menu-categories" id="menu-categories">
                <!-- Menu will be rendered here -->
            </div>
        </div>

        <!-- Settings Page -->
        <div id="page-settings" style="display: none;">
            <div class="page-header">
                <h2>Настройки ресторана</h2>
            </div>

            <div class="form-section">
                <div class="form-group">
                    <label>Название ресторана</label>
                    <input type="text" value="BLACK STAR BURGER">
                </div>
                <div class="form-group">
                    <label>Адрес</label>
                    <input type="text" value="Шереметьево, Терминал B">
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="text" value="+7 (495) 123-45-67">
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Время открытия</label>
                        <input type="time" value="06:00">
                    </div>
                    <div class="form-group">
                        <label>Время закрытия</label>
                        <input type="time" value="22:00">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveSettings()">Сохранить изменения</button>
            </div>
        </div>
    </main>
</div>

<!-- Add/Edit Menu Item Modal -->
<div class="modal" id="item-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">Добавить блюдо</h3>
            <div class="close-btn" onclick="closeModal()">&times;</div>
        </div>
        <form id="item-form">
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="item-name" required>
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="item-desc"></textarea>
            </div>
            <div class="form-group">
                <label>Цена (₽)</label>
                <input type="number" id="item-price" required>
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="item-category">
                    <option value="Бургеры">Бургеры</option>
                    <option value="Закуски">Закуски</option>
                    <option value="Напитки">Напитки</option>
                </select>
            </div>
            <div class="form-group">
                <label>URL изображения</label>
                <input type="text" id="item-image" placeholder="https://...">
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// Data
let orders = [
    {
        id: 'ORD-001',
        customer: 'Иванов М.С.',
        phone: '+7 (999) 123-45-67',
        items: [
            { name: 'Classic Burger', qty: 2, price: 690 },
            { name: 'Лимонад', qty: 2, price: 290 }
        ],
        total: 1960,
        time: '14:32',
        status: 'new',
        pickupTime: '15:00'
    },
    {
        id: 'ORD-002',
        customer: 'Петрова А.В.',
        phone: '+7 (999) 987-65-43',
        items: [
            { name: 'Black Star Burger', qty: 1, price: 890 },
            { name: 'Картофель фри', qty: 1, price: 390 }
        ],
        total: 1280,
        time: '14:28',
        status: 'new',
        pickupTime: '14:50'
    },
    {
        id: 'ORD-003',
        customer: 'Сидоров К.П.',
        phone: '+7 (999) 456-78-90',
        items: [
            { name: 'Chicken Burger', qty: 1, price: 590 },
            { name: 'Молочный шейк', qty: 1, price: 390 }
        ],
        total: 980,
        time: '14:15',
        status: 'preparing',
        pickupTime: '14:45'
    }
];

let menuData = [
    {
        category: 'Бургеры',
        items: [
            { id: 1, name: 'Classic Burger', desc: 'Говядина, чеддер, салат, томат', price: 690, image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200&h=200&fit=crop' },
            { id: 2, name: 'Black Star Burger', desc: 'Двойная котлета, бекон, соус BBQ', price: 890, image: 'https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=200&h=200&fit=crop' },
            { id: 3, name: 'Chicken Burger', desc: 'Куриная котлета, айоли, руккола', price: 590, image: 'https://images.unsplash.com/photo-1606755962773-d324e0a13086?w=200&h=200&fit=crop' }
        ]
    },
    {
        category: 'Закуски',
        items: [
            { id: 4, name: 'Картофель фри', desc: 'С трюфельным маслом', price: 390, image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=200&h=200&fit=crop' },
            { id: 5, name: 'Наггетсы', desc: 'Куриные наггетсы, 8 шт', price: 490, image: 'https://images.unsplash.com/photo-1562967914-608f82629710?w=200&h=200&fit=crop' }
        ]
    },
    {
        category: 'Напитки',
        items: [
            { id: 6, name: 'Лимонад', desc: 'Домашний, 0.4л', price: 290, image: 'https://images.unsplash.com/photo-1621263764928-df1444c5e859?w=200&h=200&fit=crop' },
            { id: 7, name: 'Молочный шейк', desc: 'Ваниль / шоколад / клубника', price: 390, image: 'https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=200&h=200&fit=crop' }
        ]
    }
];

// Navigation
function navigate(page) {
    document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none');
    document.getElementById('page-' + page).style.display = 'block';
    
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    document.querySelector(`[data-page="${page}"]`).classList.add('active');
    
    if (page === 'orders') renderOrders();
    if (page === 'menu') renderMenu();
}

document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => navigate(item.dataset.page));
});

// Render Orders
function renderOrders(filter = 'all') {
    const grid = document.getElementById('orders-grid');
    const filteredOrders = filter === 'all' ? orders : orders.filter(o => o.status === filter);
    
    grid.innerHTML = filteredOrders.map(order => {
        const statusClass = order.status;
        const statusText = {
            'new': 'Новый',
            'preparing': 'Готовится',
            'ready': 'Готов',
            'completed': 'Выдан'
        }[order.status];
        
        const statusBadgeClass = `status-${statusClass}`;
        const cardClass = statusClass === 'new' ? 'new' : statusClass === 'preparing' ? 'preparing' : statusClass === 'ready' ? 'ready' : '';
        
        let actions = '';
        if (order.status === 'new') {
            actions = `<button class="btn btn-primary btn-sm" onclick="updateOrderStatus('${order.id}', 'preparing')">Принять</button>`;
        } else if (order.status === 'preparing') {
            actions = `<button class="btn btn-success btn-sm" onclick="updateOrderStatus('${order.id}', 'ready')">Готов</button>`;
        } else if (order.status === 'ready') {
            actions = `<button class="btn btn-secondary btn-sm" onclick="updateOrderStatus('${order.id}', 'completed')">Выдан</button>`;
        }
        
        const minutesLeft = Math.floor(Math.random() * 15) + 5;
        
        return `
            <div class="order-card ${cardClass}">
                <div class="order-header">
                    <div class="order-id">${order.id}</div>
                    <span class="status-badge ${statusBadgeClass}">${statusText}</span>
                </div>
                <div class="order-customer">${order.customer} · ${order.phone}</div>
                <div class="order-items-list">
                    ${order.items.map(item => `
                        <div class="order-item-row">
                            <span>${item.qty}x ${item.name}</span>
                            <span>${item.qty * item.price} ₽</span>
                        </div>
                    `).join('')}
                </div>
                <div class="order-total">
                    <span>Итого</span>
                    <span>${order.total.toLocaleString()} ₽</span>
                </div>
                ${order.status !== 'completed' ? `
                <div class="order-timer">
                    ⏱️ Время получения: ${order.pickupTime} (через ${minutesLeft} мин)
                </div>
                ` : ''}
                <div class="order-actions">
                    ${actions}
                </div>
            </div>
        `;
    }).join('');
    
    // Update badge
    const newCount = orders.filter(o => o.status === 'new').length;
    document.getElementById('new-orders-count').textContent = newCount;
}

function filterOrders(filter) {
    renderOrders(filter);
}

function updateOrderStatus(orderId, status) {
    const order = orders.find(o => o.id === orderId);
    if (order) {
        order.status = status;
        renderOrders();
        showToast(`Заказ ${orderId} - ${status}`);
    }
}

// Render Menu
function renderMenu() {
    const container = document.getElementById('menu-categories');
    container.innerHTML = menuData.map(cat => `
        <div class="menu-category">
            <div class="category-header">
                <h3>${cat.category} (${cat.items.length})</h3>
                <button class="btn btn-primary btn-sm" onclick="showAddItemModal('${cat.category}')">+ Добавить</button>
            </div>
            <div class="category-items">
                ${cat.items.map(item => `
                    <div class="menu-item">
                        <div class="menu-item-img" style="background-image: url('${item.image}')"></div>
                        <div class="menu-item-info">
                            <div class="menu-item-name">${item.name}</div>
                            <div class="menu-item-desc">${item.desc}</div>
                            <div class="menu-item-price">${item.price} ₽</div>
                        </div>
                        <div class="menu-item-actions">
                            <button class="btn btn-secondary btn-sm" onclick="editItem(${item.id})">✏️</button>
                            <button class="btn btn-secondary btn-sm" onclick="deleteItem(${item.id})">🗑️</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function showAddItemModal(category) {
    document.getElementById('modal-title').textContent = 'Добавить блюдо';
    document.getElementById('item-form').reset();
    document.getElementById('item-category').value = category;
    document.getElementById('item-modal').classList.add('show');
}

function showAddCategoryModal() {
    const name = prompt('Название новой категории:');
    if (name) {
        menuData.push({ category: name, items: [] });
        renderMenu();
        showToast(`Категория "${name}" добавлена`);
    }
}

function closeModal() {
    document.getElementById('item-modal').classList.remove('show');
}

function editItem(id) {
    showToast('Редактирование блюда #' + id);
}

function deleteItem(id) {
    if (confirm('Удалить это блюдо?')) {
        menuData.forEach(cat => {
            cat.items = cat.items.filter(item => item.id !== id);
        });
        renderMenu();
        showToast('Блюдо удалено');
    }
}

document.getElementById('item-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const name = document.getElementById('item-name').value;
    const desc = document.getElementById('item-desc').value;
    const price = parseInt(document.getElementById('item-price').value);
    const category = document.getElementById('item-category').value;
    const image = document.getElementById('item-image').value || 'https://via.placeholder.com/200';
    
    const cat = menuData.find(c => c.category === category);
    if (cat) {
        const newId = Math.max(...menuData.flatMap(c => c.items.map(i => i.id))) + 1;
        cat.items.push({ id: newId, name, desc, price, image });
        renderMenu();
        showToast(`Блюдо "${name}" добавлено`);
    }
    
    closeModal();
});

function saveSettings() {
    showToast('Настройки сохранены');
}

// Toast
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// Simulate new orders
setInterval(() => {
    if (Math.random() > 0.7) {
        const newOrder = {
            id: 'ORD-' + String(orders.length + 1).padStart(3, '0'),
            customer: 'Новый клиент',
            phone: '+7 (999) 000-00-00',
            items: [
                { name: 'Classic Burger', qty: 1, price: 690 }
            ],
            total: 690,
            time: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }),
            status: 'new',
            pickupTime: '15:30'
        };
        orders.unshift(newOrder);
        if (document.getElementById('page-orders').style.display !== 'none') {
            renderOrders();
        }
        showToast('🔔 Новый заказ!');
    }
}, 15000);

// Initial render
renderOrders();
</script>
</body>
</html>
